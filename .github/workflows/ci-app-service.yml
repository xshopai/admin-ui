# ==============================================================================
# Admin UI - CI/CD Pipeline
# ==============================================================================
# Build, test, and deploy React app to Azure App Service
# ==============================================================================

name: CI - App Service

on:
  push:
    branches: [main, develop]
    paths:
      - "src/**"
      - "public/**"
      - "package*.json"
      - ".github/workflows/ci-app-service.yml"

  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "package*.json"

  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        type: choice
        options: [dev, prod]
        default: dev
      suffix:
        description: "Resource suffix (e.g. as01) — leave blank to use org default"
        required: false
        default: ""

env:
  NODE_VERSION: "24"
  SERVICE_NAME: admin-ui
  PROJECT_NAME: xshopai

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint --if-present
        continue-on-error: true

      - name: Run unit tests
        run: npm test -- --coverage --watchAll=false --passWithNoTests
        env:
          CI: true
        continue-on-error: true

      - name: Build application
        run: npm run build
        env:
          CI: false
          GENERATE_SOURCEMAP: false

      - name: Create deployment package
        run: |
          mkdir -p deploy
          cp -r build/* deploy/
          cp package.json deploy/
          echo '{"scripts":{"start":"npx serve -s . -l 8080"}}' > deploy/package.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: deploy/
          retention-days: 1

  deploy:
    name: Deploy (${{ inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    needs: build-and-test
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'

    environment:
      name: ${{ inputs.environment || 'dev' }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app-build
          path: ./deploy

      # Resolve App Service name (must match infra naming convention)
      - name: Resolve configuration
        run: |
          ENV="${{ inputs.environment || 'dev' }}"
          INPUT_SUFFIX="${{ inputs.suffix }}"

          if [ -n "$INPUT_SUFFIX" ]; then
            SUFFIX="$INPUT_SUFFIX"
          elif [ "$ENV" = "prod" ]; then
            SUFFIX="${{ vars.DEPLOY_SUFFIX_PROD }}"
          else
            SUFFIX="${{ vars.DEPLOY_SUFFIX_DEV }}"
          fi

          if [ -z "$SUFFIX" ]; then
            echo "::error::No suffix resolved — set DEPLOY_SUFFIX_DEV / DEPLOY_SUFFIX_PROD org variables or pass the suffix input"
            exit 1
          fi

          # Infrastructure naming: app-{service}-{project}-{suffix}
          # Note: suffix already includes environment context (e.g., "development" for dev)
          APP_NAME="app-${{ env.SERVICE_NAME }}-${{ env.PROJECT_NAME }}-${SUFFIX}"

          {
            echo "ENV=$ENV"
            echo "SUFFIX=$SUFFIX"
            echo "APP_NAME=$APP_NAME"
          } >> "$GITHUB_ENV"

          echo "Deploying **${{ env.SERVICE_NAME }}** → \`${APP_NAME}\`"

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./deploy
