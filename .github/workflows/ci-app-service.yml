# ==============================================================================
# Admin UI - CI/CD Pipeline
# ==============================================================================
# Build, test, and deploy React app to Azure App Service
# ==============================================================================

name: CI - App Service

on:
  push:
    branches: [main, develop]
    paths:
      - "src/**"
      - "public/**"
      - "package*.json"
      - "tests/e2e/**"
      - "playwright.config.js"
      - ".github/workflows/ci-app-service.yml"

  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "package*.json"
      - "tests/e2e/**"
      - "playwright.config.js"

  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        type: choice
        options: [dev, prod]
        default: dev
      suffix:
        description: "Resource suffix (e.g. as01) — leave blank to use org default"
        required: false
        default: ""

env:
  NODE_VERSION: "24"
  SERVICE_NAME: admin-ui
  PROJECT_NAME: xshopai

jobs:
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint --if-present

      - name: Run unit tests
        run: npm test -- --coverage --watchAll=false --passWithNoTests
        env:
          CI: true

      - name: Verify build
        run: npm run build
        env:
          CI: false
          GENERATE_SOURCEMAP: false

  playwright:
    name: Playwright E2E (Azure)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: dev
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Azure login (OIDC)
        if: vars.PLAYWRIGHT_SERVICE_URL != ''
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # azure/login sets up the AZ CLI session but does NOT set the env vars
      # that @azure/identity's DefaultAzureCredential needs. The reporter
      # uploads test results to blob storage and requires a valid credential.
      # We request a fresh GitHub OIDC token and write it to a file so that
      # WorkloadIdentityCredential (part of DefaultAzureCredential) picks it up.
      - name: Set up Azure identity env vars for @azure/identity
        if: vars.PLAYWRIGHT_SERVICE_URL != ''
        run: |
          TOKEN=$(curl -sS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange" \
            | jq -r '.value')
          echo "$TOKEN" > "$RUNNER_TEMP/oidc-token"
          echo "AZURE_FEDERATED_TOKEN_FILE=$RUNNER_TEMP/oidc-token" >> "$GITHUB_ENV"
          echo "AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}" >> "$GITHUB_ENV"
          echo "AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" >> "$GITHUB_ENV"

      - name: Run Playwright tests (Azure Playwright Testing)
        if: vars.PLAYWRIGHT_SERVICE_URL != ''
        run: npx playwright test --config=playwright.service.config.js
        env:
          CI: true
          PLAYWRIGHT_SERVICE_URL: ${{ vars.PLAYWRIGHT_SERVICE_URL }}

      - name: Run Playwright tests (local fallback)
        if: vars.PLAYWRIGHT_SERVICE_URL == ''
        run: npx playwright test
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  build:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: [test, playwright]
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Determine BFF URL based on environment
      - name: Set BFF URL
        run: |
          ENV="${{ inputs.environment || 'dev' }}"
          if [ "$ENV" = "prod" ]; then
            SUFFIX="${{ vars.DEPLOY_SUFFIX_PROD }}"
          else
            SUFFIX="${{ vars.DEPLOY_SUFFIX_DEV || 'development' }}"
          fi
          BFF_URL="https://app-web-bff-${{ env.PROJECT_NAME }}-${SUFFIX}.azurewebsites.net"
          echo "REACT_APP_BFF_URL=${BFF_URL}" >> "$GITHUB_ENV"
          echo "BFF URL: ${BFF_URL}"

      - name: Build application
        run: npm run build
        env:
          CI: false
          GENERATE_SOURCEMAP: false
          REACT_APP_BFF_URL: ${{ env.REACT_APP_BFF_URL }}

      - name: Create deployment package
        run: |
          mkdir -p deploy
          cp -r build/* deploy/
          echo '{"scripts":{"start":"npx serve -s . -l 8080"}}' > deploy/package.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: deploy/
          retention-days: 1

  deploy:
    name: Deploy (${{ inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    needs: [build]
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'

    environment:
      name: ${{ inputs.environment || 'dev' }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app-build
          path: ./deploy

      - name: Azure login (OIDC)
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Resolve App Service name (must match infra naming convention)
      - name: Resolve configuration
        run: |
          ENV="${{ inputs.environment || 'dev' }}"
          INPUT_SUFFIX="${{ inputs.suffix }}"

          if [ -n "$INPUT_SUFFIX" ]; then
            SUFFIX="$INPUT_SUFFIX"
          elif [ "$ENV" = "prod" ]; then
            SUFFIX="${{ vars.DEPLOY_SUFFIX_PROD }}"
          else
            SUFFIX="${{ vars.DEPLOY_SUFFIX_DEV }}"
          fi

          if [ -z "$SUFFIX" ]; then
            echo "::error::No suffix resolved — set DEPLOY_SUFFIX_DEV / DEPLOY_SUFFIX_PROD org variables or pass the suffix input"
            exit 1
          fi

          # Infrastructure naming: app-{service}-{project}-{suffix}
          # Note: suffix already includes environment context (e.g., "development" for dev)
          APP_NAME="app-${{ env.SERVICE_NAME }}-${{ env.PROJECT_NAME }}-${SUFFIX}"

          {
            echo "ENV=$ENV"
            echo "SUFFIX=$SUFFIX"
            echo "APP_NAME=$APP_NAME"
          } >> "$GITHUB_ENV"

          echo "Deploying **${{ env.SERVICE_NAME }}** → \`${APP_NAME}\`"

      - name: Create deployment zip
        run: |
          cd ./deploy
          zip -r ../deploy.zip . -q
          echo "✓ Package created: $(du -h ../deploy.zip | cut -f1)"

      - name: Deploy to Azure App Service
        run: |
          az webapp deploy \
            --resource-group "rg-${{ env.PROJECT_NAME }}-${{ env.SUFFIX }}" \
            --name "${{ env.APP_NAME }}" \
            --src-path deploy.zip \
            --type zip \
            --async false

          echo "✓ Deployment completed successfully"
          echo "URL: https://${{ env.APP_NAME }}.azurewebsites.net"
