# ==============================================================================
# Admin UI - CI/CD Pipeline
# ==============================================================================
# Build, test, and deploy React app to Azure App Service
# ==============================================================================

name: CI - App Service

on:
  push:
    branches: [main, develop]
    paths:
      - "src/**"
      - "public/**"
      - "package*.json"
      - ".github/workflows/ci-app-service.yml"

  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "package*.json"

  workflow_dispatch:

env:
  NODE_VERSION: "24"
  SERVICE_NAME: admin-ui
  AZURE_WEBAPP_NAME: app-admin-ui-xshopai-development

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint --if-present
        continue-on-error: true

      - name: Run unit tests
        run: npm test -- --coverage --watchAll=false --passWithNoTests
        env:
          CI: true
        continue-on-error: true

      - name: Build application
        run: npm run build
        env:
          CI: false
          GENERATE_SOURCEMAP: false

      - name: Create deployment package
        run: |
          mkdir -p deploy
          cp -r build/* deploy/
          cp package.json deploy/
          echo '{"scripts":{"start":"npx serve -s . -l 8080"}}' > deploy/package.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: deploy/
          retention-days: 1

  deploy:
    name: Deploy to App Service
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: development
      url: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app-build
          path: ./deploy

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ./deploy

      - name: Logout from Azure
        if: always()
        run: az logout
